<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matte Black Real Estate - Team Intranet</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}</script>
<style>
:root{
  --black:#000;--white:#fff;--teal:#1db5a8;--teal-deep:#0f7d73;
  --bg:#f4f5f5;--panel:#fff;--ink:#11201f;--ink-soft:rgba(17,32,31,.6);--ink-faint:rgba(17,32,31,.42);
  --line:rgba(17,32,31,.1);--line-strong:rgba(17,32,31,.16);
  --sidebar:#000;--sidebar-soft:rgba(255,255,255,.62);--sidebar-faint:rgba(255,255,255,.4);--sidebar-line:rgba(255,255,255,.12);
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);--r:3px;
  --lead:#1db5a8;--prep:#3a86c8;--neg:#d99a2b;--sold:#1f9d57;--wd:#9aa0a0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--teal);color:#fff}
.mono{width:0;height:0}
.serif{font-family:var(--serif)}
.hide{display:none!important}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:.55em;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.8em 1.3em;border:1px solid transparent;border-radius:var(--r);transition:all .25s var(--ease);white-space:nowrap}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}.btn-teal:hover{background:var(--teal-deep);border-color:var(--teal-deep)}
.btn-dark{background:var(--black);color:#fff;border-color:var(--black)}.btn-dark:hover{background:#222}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}.btn-ghost:hover{border-color:var(--ink);background:var(--ink);color:#fff}
.btn-ghost-light{background:transparent;color:#fff;border-color:rgba(255,255,255,.3)}.btn-ghost-light:hover{background:#fff;color:#000}
.btn-sm{padding:.55em .9em;font-size:11px}
.btn-danger{background:transparent;color:#c0392b;border-color:rgba(192,57,43,.4)}.btn-danger:hover{background:#c0392b;color:#fff}
.btn[disabled]{opacity:.45;pointer-events:none}
.eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;color:var(--teal)}

/* form */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
.input,.select,textarea.input{width:100%;padding:11px 13px;border:1px solid var(--line-strong);border-radius:var(--r);font-family:inherit;font-size:14px;background:#fff;color:var(--ink);transition:border-color .2s}
.input:focus,.select:focus,textarea.input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,181,168,.12)}
textarea.input{resize:vertical;min-height:90px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:.4em;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:.35em .7em;border-radius:20px;border:1px solid}
.badge.draft{color:#7a7f7f;border-color:#cfd3d3;background:#f3f4f4}
.badge.published{color:var(--teal-deep);border-color:rgba(15,125,115,.3);background:rgba(29,181,168,.1)}
.badge.archived{color:#9aa0a0;border-color:#dfe2e2;background:#f7f8f8}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ===================== LOGIN ===================== */
#login{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
#login .bgmark{position:absolute;color:#fff;opacity:.04;width:520px;right:-90px;bottom:-120px}
.login-card{position:relative;width:100%;max-width:420px;text-align:center;color:#fff}
.login-card .lmark{width:clamp(150px,42vw,182px);height:auto;margin:0 auto 24px;display:block}
.login-card h1{font-family:var(--serif);font-weight:500;font-size:34px;line-height:1.1;margin-bottom:6px}
.login-card .sub{color:var(--sidebar-soft);font-size:13px;margin-bottom:30px}
.login-form{background:#0c0c0c;border:1px solid var(--sidebar-line);border-radius:6px;padding:30px;text-align:left}
.login-form .field label{color:var(--sidebar-faint)}
.login-form .input{background:#141414;border-color:#262626;color:#fff}
.login-form .input:focus{border-color:var(--teal)}
.login-form .btn{width:100%;justify-content:center;margin-top:6px;padding:1em}
.login-err{background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.4);color:#ffb4ab;font-size:12.5px;padding:10px 12px;border-radius:var(--r);margin-bottom:14px}
.login-foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12px}
.login-foot a{color:var(--teal)}
.demo-note{margin-top:22px;font-size:11.5px;color:var(--sidebar-faint);line-height:1.7;border-top:1px solid var(--sidebar-line);padding-top:16px}
.demo-note b{color:#fff}
.login-back{position:absolute;top:22px;left:24px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--sidebar-soft)}
.login-back:hover{color:#fff}

/* ===================== APP SHELL ===================== */
#app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{display:flex;align-items:center;gap:11px;padding:22px 22px 20px}
.sb-brand .smark{width:30px;color:var(--teal);flex:0 0 auto}
.sb-brand .t{font-family:var(--serif);font-size:19px;line-height:1;font-weight:600}
.sb-brand .t small{display:block;font-family:var(--sans);font-size:8.5px;letter-spacing:.32em;color:var(--sidebar-faint);margin-top:4px;font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:6px 12px}
.sb-group{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--sidebar-faint);font-weight:700;padding:18px 10px 8px}
.sb-link{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r);color:var(--sidebar-soft);font-size:13px;font-weight:500;transition:all .18s;margin-bottom:1px;position:relative}
.sb-link:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-link.active{background:rgba(29,181,168,.14);color:#fff}
.sb-link.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--teal);border-radius:0 2px 2px 0}
.sb-link svg{width:17px;height:17px;flex:0 0 auto;stroke:currentColor;fill:none;stroke-width:1.6}
.sb-link .lock{margin-left:auto;width:12px;height:12px;opacity:.5}
.sb-user{border-top:1px solid var(--sidebar-line);padding:14px 16px;display:flex;align-items:center;gap:11px}
.sb-user .av{width:34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto}
.sb-user .nm{font-size:12.5px;font-weight:600;line-height:1.2}
.sb-user .rl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sidebar-faint)}
.sb-user button{margin-left:auto;background:none;border:0;color:var(--sidebar-soft);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.sb-user button:hover{color:#fff}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 30px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.topbar .crumb{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.topbar h1{font-family:var(--serif);font-size:25px;font-weight:600;line-height:1.1;margin-top:2px}
.topbar .actions{display:flex;gap:10px;align-items:center}
.content{padding:28px 30px 60px;max-width:1280px;width:100%}
.session-pill{font-size:11px;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
.session-pill .dot{background:var(--sold)}

/* cards / panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:6px}
.panel-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.panel-h h3{font-family:var(--serif);font-size:19px;font-weight:600}
.panel-b{padding:18px}
.grid{display:grid;gap:18px}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-2{grid-template-columns:repeat(2,1fr)}
.stat{background:#fff;border:1px solid var(--line);border-radius:6px;padding:18px 20px}
.stat .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.stat .v{font-family:var(--serif);font-size:38px;font-weight:600;line-height:1;margin-top:10px}
.stat .v small{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-soft);letter-spacing:0}
.stat .sub{font-size:11.5px;color:var(--ink-soft);margin-top:6px}
.stat.teal{background:var(--teal);border-color:var(--teal);color:#fff}
.stat.teal .k,.stat.teal .sub{color:rgba(255,255,255,.85)}
.stat.dark{background:#000;border-color:#000;color:#fff}.stat.dark .k,.stat.dark .sub{color:rgba(255,255,255,.7)}

/* lists / tables */
.list-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border-bottom:0}
.list-row .ttl{font-family:var(--serif);font-size:17px;font-weight:600;line-height:1.15}
.list-row .meta{font-size:11.5px;color:var(--ink-soft)}
.list-row .right{margin-left:auto;display:flex;align-items:center;gap:10px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line-strong)}
table.tbl td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
table.tbl tr:hover td{background:#fafbfb}
.linklike{color:var(--teal-deep);font-weight:600}.linklike:hover{text-decoration:underline}
.timeline .ti{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
.timeline .ti:last-child{border-bottom:0}
.timeline .ti .tdot{width:8px;height:8px;border-radius:50%;background:var(--teal);margin-top:6px;flex:0 0 auto}
.timeline .ti .tt{color:var(--ink-faint);font-size:11px;margin-top:2px}
.muted{color:var(--ink-soft)}.tiny{font-size:11px}
.quick{display:flex;gap:12px;flex-wrap:wrap}
.quick .qa{display:flex;align-items:center;gap:10px;padding:14px 18px;border:1px solid var(--line);border-radius:6px;background:#fff;font-weight:600;font-size:13px;transition:all .2s}
.quick .qa:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 12px 30px -18px rgba(0,0,0,.3)}
.quick .qa svg{width:18px;height:18px;stroke:var(--teal);fill:none;stroke-width:1.7}

/* pipeline kanban */
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
.kcol{background:#eef0f0;border:1px solid var(--line);border-radius:6px;min-height:160px;display:flex;flex-direction:column}
.kcol.drop{outline:2px dashed var(--teal);outline-offset:-4px;background:rgba(29,181,168,.07)}
.kcol-h{padding:12px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.kcol-h .ct{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 8px;font-size:11px}
.kcol-b{padding:10px;display:flex;flex-direction:column;gap:10px;flex:1}
.kcard{background:#fff;border:1px solid var(--line-strong);border-left:3px solid var(--teal);border-radius:5px;padding:12px;cursor:grab;transition:box-shadow .2s,transform .2s}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.4}
.kcard:hover{box-shadow:0 10px 26px -16px rgba(0,0,0,.4)}
.kcard .ad{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.15}
.kcard .sl{font-size:11.5px;color:var(--ink-soft);margin:2px 0 9px}
.kcard .pr{font-weight:700;font-size:13px}
.kcard .ft{display:flex;align-items:center;justify-content:space-between;margin-top:9px;font-size:10.5px;color:var(--ink-faint)}
.kcard .as{display:inline-flex;align-items:center;gap:5px}
.kcard .as .av{width:18px;height:18px;border-radius:50%;background:var(--black);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:24px;z-index:60;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:8px;width:100%;max-width:540px;max-height:90vh;overflow:auto;box-shadow:0 40px 90px -30px rgba(0,0,0,.6)}
.modal.wide{max-width:920px}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
.modal-h h3{font-family:var(--serif);font-size:22px;font-weight:600}
.modal-h .x{background:none;border:0;font-size:22px;color:var(--ink-soft);line-height:1}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}

/* builder */
.stepper{display:flex;align-items:center;flex-wrap:wrap;gap:6px 0;margin-bottom:22px}
.step{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;color:var(--ink-faint)}
.step .n{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line-strong);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-faint);flex:0 0 auto}
.step.done{color:var(--ink)}.step.done .n{background:var(--teal);border-color:var(--teal);color:#fff}
.step.active{color:var(--ink)}.step.active .n{border-color:var(--teal);color:var(--teal-deep)}
.step-sep{width:34px;height:1.5px;background:var(--line-strong);margin:0 12px}
.upload-hero{max-width:680px;margin:0 auto}
.dz-big{border:2px dashed var(--line-strong);border-radius:10px;padding:46px 30px;text-align:center;background:#fafbfb;transition:all .2s}
.dz-big.over{border-color:var(--teal);background:rgba(29,181,168,.06)}
.dz-big .ico{width:44px;height:44px;color:var(--teal);margin:0 auto 14px;display:block}
.file-chip{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line-strong);border-radius:30px;padding:7px 15px;font-size:13px;font-weight:600;margin-top:16px}
.file-chip .rm{color:var(--ink-faint);cursor:pointer;font-size:16px;line-height:1}
.file-chip .rm:hover{color:#c0392b}
.ai-banner{display:flex;align-items:flex-start;gap:10px;background:rgba(29,181,168,.08);border:1px solid rgba(29,181,168,.3);border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13px;line-height:1.5}
.ai-banner b{color:var(--teal-deep)}
.spin{width:36px;height:36px;border:3px solid var(--line-strong);border-top-color:var(--teal);border-radius:50%;animation:rot .8s linear infinite;margin:0 auto 16px}
@keyframes rot{to{transform:rotate(360deg)}}
.ana-line{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);padding:5px 0}
.ana-line .ok{color:var(--sold);font-weight:700}
.builder{display:grid;grid-template-columns:1fr 340px;gap:22px;align-items:start}
.seg{display:flex;gap:8px}
.seg-opt{flex:1;display:flex;align-items:center;gap:7px;justify-content:center;border:1px solid var(--line-strong);border-radius:var(--r);padding:9px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.seg-opt.on{border-color:var(--teal);background:rgba(29,181,168,.08);color:var(--teal-deep)}
.seg-opt input{accent-color:var(--teal)}
.pkg-edit{border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px;background:#fafbfb}
.pkg-edit.rec{border-color:var(--teal);box-shadow:0 0 0 2px rgba(29,181,168,.12)}
.pkg-edit-h{display:flex;align-items:center;gap:12px}
.pkg-edit input,.pkg-edit textarea{background:#fff}

/* ===== client-facing proposal (full screen) ===== */
.pp{position:fixed;inset:0;z-index:80;background:#fff;overflow-y:auto;color:var(--ink)}
.pp-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);color:#fff}
.pp-bar .l{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:17px}
.pp-bar .l img{height:26px;display:block}
.pp-bar .l svg{width:24px;color:var(--teal)}
.pp-bar .r{display:flex;gap:10px;align-items:center}
.pp-sec{max-width:980px;margin:0 auto;padding:64px 28px}
.pp-sec.tight{max-width:820px}
.pp-eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;color:var(--teal-deep);margin-bottom:14px}
.pp h1,.pp h2,.pp h3{font-family:var(--serif);font-weight:600;line-height:1.12}
.pp-hero{position:relative;background:#000;color:#fff;text-align:center;padding:58px 28px 52px;background-size:cover;background-position:center 42%;text-shadow:0 1px 18px rgba(0,0,0,.55)}
.pp-hero>*{position:relative;z-index:1}
.pp-hero .mk{width:clamp(150px,26vw,200px);height:auto;margin:0 auto 24px;display:block;filter:drop-shadow(0 2px 14px rgba(0,0,0,.5))}
.pp-hero .eg{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.78);font-weight:700}
.pp-hero h1{font-size:clamp(32px,5.4vw,54px);font-weight:500;margin:14px 0 6px}
.pp-hero .sub{color:rgba(255,255,255,.82);font-size:15px}
.pp-hero .prep{margin-top:26px;font-size:13px;color:rgba(255,255,255,.9)}
.pp-hero .prep b{font-family:var(--serif);font-size:24px;font-weight:500;display:block;margin-top:6px;color:var(--teal)}
.pp-chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.pp-chip{border:1px solid rgba(255,255,255,.22);border-radius:30px;padding:8px 16px;font-size:12px;letter-spacing:.04em}
.pp-chip.teal{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700}
.pp-letter{font-family:var(--serif);font-size:clamp(17px,2.1vw,21px);line-height:1.7;color:#222;white-space:pre-line}
.pp-sign{margin-top:26px;display:flex;align-items:center;gap:16px}
.pp-sign .nm{font-family:var(--serif);font-size:22px;font-weight:600}
.pp-sign .tt{font-size:12px;letter-spacing:.06em;color:var(--ink-soft)}
.pp-alt{background:#f6f7f7}
.pp-grid{display:grid;gap:22px}
.pp-g2{grid-template-columns:1fr 1fr}.pp-g3{grid-template-columns:repeat(3,1fr)}
.pod{border-top:2px solid var(--teal);padding-top:16px}
.pod h3{font-size:20px;margin-bottom:8px}
.pod p{color:var(--ink-soft);font-size:14px;line-height:1.6}
.pp-table{width:100%;border-collapse:collapse;font-size:14px}
.pp-table th{text-align:left;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:10px 12px;border-bottom:2px solid var(--ink)}
.pp-table td{padding:13px 12px;border-bottom:1px solid var(--line)}
.pp-guide{text-align:center;background:#000;color:#fff;border-radius:10px;padding:38px}
.pp-guide .k{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:700}
.pp-guide .v{font-family:var(--serif);font-size:clamp(30px,5vw,46px);font-weight:500;margin-top:10px;color:var(--teal)}
.pp-cma-dl{margin-top:26px}
.pp-cma-btn{display:inline-flex;align-items:center;gap:14px;width:100%;justify-content:flex-start;text-align:left;background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:16px 20px;cursor:pointer;transition:border-color .2s,box-shadow .2s,background .2s;font-family:var(--sans)}
.pp-cma-btn:hover{border-color:var(--teal);box-shadow:0 6px 22px rgba(0,0,0,.06)}
.pp-cma-btn svg{width:26px;height:26px;flex:0 0 auto;stroke:var(--teal-deep);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.pp-cma-btn .t{display:flex;flex-direction:column;font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:.01em}
.pp-cma-btn .t small{font-weight:500;font-size:12px;color:var(--ink-soft);margin-top:2px;letter-spacing:0}
.pkg{display:flex;flex-direction:column;border:1px solid var(--line-strong);border-radius:10px;padding:24px;background:#fff;position:relative}
.pkg.rec{border-color:var(--teal);box-shadow:0 20px 50px -28px rgba(29,181,168,.6);transform:translateY(-6px)}
.pkg .rbadge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:5px 13px;border-radius:20px;white-space:nowrap}
.pkg .tag{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal-deep)}
.pkg .nm{font-family:var(--serif);font-size:26px;font-weight:600;margin:6px 0}
.pkg .pr{font-family:var(--serif);font-size:30px;font-weight:600}.pkg .pr small{font-family:var(--sans);font-size:12px;color:var(--ink-soft);font-weight:600}
.pkg .bl{color:var(--ink-soft);font-size:13px;margin:8px 0 14px;line-height:1.5}
.pkg ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:auto}
.pkg li{font-size:13px;display:flex;gap:9px;align-items:flex-start;line-height:1.4}
.pkg li svg{width:15px;height:15px;flex:0 0 auto;stroke:var(--teal);fill:none;stroke-width:2.4;margin-top:2px}
.pp-fee{text-align:center;border:1px solid var(--line-strong);border-radius:10px;padding:32px}
.pp-fee .v{font-family:var(--serif);font-size:clamp(28px,4vw,40px);font-weight:600;color:var(--ink)}
.pp-fee .n{font-size:13px;color:var(--ink-soft);margin-top:8px}
.tm{display:flex;gap:18px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:20px;background:#fff}
.tm .av{width:84px;height:84px;border-radius:50%;background:#000;color:var(--teal);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:28px;font-weight:600;flex:0 0 auto;overflow:hidden}
.tm .av img{width:100%;height:100%;object-fit:cover;display:block}
.pkg.sel{border-color:var(--teal-deep)}
.pp-pick{margin-top:16px;width:100%;border:1px solid var(--ink);background:#fff;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:.03em;padding:.85em 1em;border-radius:5px;cursor:pointer;transition:all .15s}
.pp-pick:hover{background:var(--ink);color:#fff}
.pp-pick.on{background:var(--teal);border-color:var(--teal);color:#fff}
.tm.lead{background:#000;color:#fff;border-color:#000}.tm.lead .av{background:var(--teal);color:#000}
.tm .nm{font-family:var(--serif);font-size:21px;font-weight:600}
.tm .tt{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--teal-deep);margin:3px 0 4px}
.tm.lead .tt{color:var(--teal)}
.tm .cr{font-size:11px;color:var(--ink-faint);margin-bottom:8px}.tm.lead .cr{color:rgba(255,255,255,.6)}
.tm .bio{font-size:13.5px;line-height:1.6;color:var(--ink-soft)}.tm.lead .bio{color:rgba(255,255,255,.82)}
.tm .ct{font-size:12px;margin-top:8px;color:var(--ink-faint)}.tm.lead .ct{color:rgba(255,255,255,.7)}
.pp-cta{background:#000;color:#fff;text-align:center;padding:80px 28px}
.pp-cta h2{font-size:clamp(28px,4.4vw,44px);font-weight:500;margin-bottom:10px}
.pp-cta p{color:rgba(255,255,255,.72);max-width:560px;margin:0 auto 30px;line-height:1.6}
.pp-cta .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.pp-btn{display:inline-flex;align-items:center;gap:.5em;font-size:13px;font-weight:700;letter-spacing:.04em;padding:1.1em 1.9em;border-radius:4px;border:1px solid;transition:all .2s}
.pp-btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}.pp-btn-teal:hover{background:var(--teal-deep)}
.pp-btn-ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.4)}.pp-btn-ghost:hover{background:#fff;color:#000}
.pp-done{max-width:520px;margin:18px auto 0;background:rgba(29,181,168,.12);border:1px solid rgba(29,181,168,.4);border-radius:8px;padding:22px;text-align:left}
.pp-done h4{font-family:var(--serif);font-size:20px;margin-bottom:8px}
.pp-done ol{margin:0 0 0 18px;font-size:13.5px;line-height:1.7;color:rgba(255,255,255,.85)}
.pp-foot{background:#0a0a0a;color:rgba(255,255,255,.55);font-size:11.5px;text-align:center;padding:30px 28px;line-height:1.7}
@media(max-width:760px){.pp-g2,.pp-g3{grid-template-columns:1fr}.pkg.rec{transform:none}.pp-sec{padding:46px 20px}.tm{flex-direction:column}}
.dropzone{border:2px dashed var(--line-strong);border-radius:6px;padding:26px;text-align:center;color:var(--ink-soft);font-size:13px;transition:all .2s;background:#fafbfb}
.dropzone.over{border-color:var(--teal);background:rgba(29,181,168,.06);color:var(--teal-deep)}
.cma-row{display:grid;grid-template-columns:1fr 100px 100px 64px 28px;gap:8px;align-items:center;margin-bottom:8px}
.save-ind{font-size:11px;color:var(--sold);display:inline-flex;align-items:center;gap:6px}
.preset-chip{display:inline-block;font-size:11px;border:1px solid var(--line-strong);border-radius:20px;padding:4px 10px;margin:0 6px 6px 0;background:#fff;cursor:pointer}
.preset-chip:hover{border-color:var(--teal);color:var(--teal-deep)}

/* bar chart */
.bars{display:flex;align-items:flex-end;gap:10px;height:160px;padding-top:10px}
.bars .bar{flex:1;background:linear-gradient(var(--teal),var(--teal-deep));border-radius:3px 3px 0 0;position:relative;min-height:3px;transition:height .6s var(--ease)}
.bars .bar span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:11px;font-weight:700}
.bars .bar small{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-faint)}
.funnel .fr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.funnel .fbar{height:30px;background:var(--teal);border-radius:3px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;padding:0 10px;min-width:40px}
.funnel .fl{width:140px;font-size:12px;font-weight:600}

.empty{text-align:center;padding:46px 20px;color:var(--ink-faint)}
.empty .em{width:40px;color:var(--line-strong);margin:0 auto 12px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#000;color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .3s var(--ease);z-index:90;box-shadow:0 16px 40px -16px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .dot{background:var(--teal)}

@media (max-width:1100px){.g-4{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(3,1fr)}.kanban{grid-template-columns:repeat(2,1fr);overflow-x:visible}.builder{grid-template-columns:1fr}}
@media (max-width:820px){
  #app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;transform:translateX(-100%);transition:transform .3s var(--ease);z-index:40}
  .sidebar.open{transform:none}
  .menu-btn{display:inline-flex!important}
  .g-3,.g-2,.row2,.row3{grid-template-columns:1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:1fr}
  .content{padding:20px 16px 50px}.topbar{padding:14px 16px}
}
.menu-btn{display:none;background:none;border:1px solid var(--line-strong);border-radius:var(--r);padding:8px 10px;align-items:center}
.menu-btn svg{width:18px;height:18px;stroke:var(--ink);stroke-width:1.8;fill:none}

}

function sessionValid(){if(!session)return false;const limitMin=session.remember?43200:SESSION_MINUTES;return (now()-(session.lastActive||session.loginAt||0)) < limitMin*60000;}
function doLogin(){
  const err=$('#loginErr');
  if(now()<lockedUntil){err.textContent='Too many attempts. Try again in '+Math.ceil((lockedUntil-now())/1000)+'s.';err.classList.remove('hide');return;}
  const email=$('#liEmail').value.trim().toLowerCase();
  const pass=$('#liPass').value;
  const u=db.users.find(u=>u.email.toLowerCase()===email&&u.active);
  if(!u||u.password!==pass){
    failedAttempts++;
    if(failedAttempts>=5){lockedUntil=now()+30000;failedAttempts=0;err.textContent='Account temporarily locked after 5 failed attempts (30s).';}
    else err.textContent='Invalid email or password. ('+(5-failedAttempts)+' attempts left)';
    err.classList.remove('hide');return;
  }
  failedAttempts=0;
  const remember=!!($('#liRemember')&&$('#liRemember').checked);
  saveRemember(remember?{email}:null);
  session={userId:u.id,loginAt:now(),lastActive:now(),remember};saveSession(session);
  err.classList.add('hide');$('#liPass').value='';
  enterApp();
}
['liEmail','liPass'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doLogin();}});});
function logout(msg){session=null;saveSession(null);$('#app').classList.add('hide');$('#login').style.display='flex';if(msg)setTimeout(()=>{const e=$('#loginErr');e.textContent=msg;e.classList.remove('hide');},50);}
function enterApp(){if(session){session.lastActive=now();saveSession(session);}$('#login').style.display='none';$('#app').classList.remove('hide');route='dashboard';render();}
let lastTouch=0;
function touchSession(){if(!session)return;const t=now();session.lastActive=t;if(t-lastTouch>30000){lastTouch=t;saveSession(session);}}
['click','keydown','mousemove','scroll','input','touchstart'].forEach(ev=>document.addEventListener(ev,touchSession,{passive:true}));
setInterval(()=>{if(session&&!sessionValid()){logout('Your session timed out after '+SESSION_MINUTES+' minutes of inactivity. Please sign in again.');}},20000);

async function pdfText(file){
  const data=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data}).promise;
  const lines=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    let lastY=null,cur='';
    tc.items.forEach(it=>{
      const y=it.transform[5];
      if(lastY!==null&&Math.abs(y-lastY)>3.2){lines.push(cur.trim());cur='';}
      cur+=it.str+' ';lastY=y;
    });
    if(cur.trim())lines.push(cur.trim());
  }
  return lines.join('\n');
}

function applyCMA(p,d){
  if(d.address)p.address=d.address;
  if(d.suburb)p.suburb=d.suburb;
  if(d.beds)p.beds=d.beds;if(d.baths)p.baths=d.baths;if(d.cars)p.cars=d.cars;
  if(d.land)p.land=d.land;
  if(d.priceLow)p.priceLow=d.priceLow;if(d.priceHigh)p.priceHigh=d.priceHigh;
  if(d.seller)p.sellerName=d.seller;
  if(d.comps&&d.comps.length)p.cma=d.comps;
  p.template=p.template||'Premium Sales Campaign';
  const sub=(d.suburb||'').replace(/\s*WA.*/,'')||'the area';
  const range=(d.priceLow||d.priceHigh)?fmtRange(d.priceLow||d.priceHigh,d.priceHigh||d.priceLow):'';
  const nComp=(d.comps&&d.comps.length)||0;
  let strat=`Drawing on the ${nComp?nComp+' comparable sale'+(nComp>1?'s':''):'comparable evidence'} in your CMA${d.address?' for '+d.address:''}${d.suburb?', '+d.suburb:''}, the recommendation is a deliberate, premium campaign${range?' supported at a guide of '+range:''}. Considered presentation, professional photography and twilight imagery, a disciplined launch, and a negotiation approach built to protect the result.`;
  if(d.notes)strat+=`\n\nFrom your appraisal notes: ${d.notes}`;
  p.content.strategy=strat;
  if(!p.content.marketing)p.content.marketing=`Professional photography and twilight imagery, premiere placements across realestate.com.au and Domain, targeted social retargeting, the Matte Black private-buyer database, and a structured open-home programme over a focused four-week campaign.`;
}
function abToBase64(buf){let bin='';const bytes=new Uint8Array(buf);const chunk=0x8000;for(let i=0;i<bytes.length;i+=chunk){bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));}return btoa(bin);}
function mergeExtract(a,b){const pick=(x,y)=>(x===''||x==null)?y:x;return {address:pick(a.address,b.address),suburb:pick(a.suburb,b.suburb),beds:pick(a.beds,b.beds),baths:pick(a.baths,b.baths),cars:pick(a.cars,b.cars),land:pick(a.land,b.land),priceLow:pick(a.priceLow,b.priceLow),priceHigh:pick(a.priceHigh,b.priceHigh),seller:pick(a.seller,b.seller),comps:(a.comps&&a.comps.length)?a.comps:(b.comps||[]),notes:pick(a.notes,b.notes)};}
async function extractWithClaude(file){
  const buf=await file.arrayBuffer();const b64=abToBase64(buf);
  const isPdf=/\.pdf$/i.test(file.name||'')||file.type==='application/pdf';
  const docBlock=isPdf?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
    :{type:'image',source:{type:'base64',media_type:file.type||'image/png',data:b64}};
  const prompt='You are reading a real-estate Comparative Market Analysis (CMA), commonly generated by Cotality / RP Data. Identify the SUBJECT PROPERTY being appraised - it usually appears as a prominent heading repeated on several pages and right after wording like "appraise your property at" - and IGNORE the agency office address, agent name, phone, email and any letterhead or footer contact details. Return ONLY a JSON object (no markdown fences, no commentary) with exactly these keys: {"address": string (subject street address only, no suburb/state), "suburb": string (suburb plus state, e.g. "Gosnells WA"), "beds": number|null, "baths": number|null, "cars": number|null, "land": string|null (e.g. "807 sqm"), "priceLow": number|null, "priceHigh": number|null (the appraised value range, e.g. a "Market Appraisal" of $760,000 - $790,000; if a single figure is given, set both to it), "sellerName": string|null (the vendor/owner the report is addressed to, e.g. taken from a "Dear ...," salutation - never the agent), "comps": [{"address": string, "price": number, "date": string, "dom": number|null (days on market, e.g. the "DOM" value)}] (ONLY the SOLD comparable sales, not the current/for-sale listings), "agentNotes": string|null (the agent commentary, e.g. the text under "Notes from your agent")}. Use null or [] where a value is not present. All numbers must be plain integers with no $ or commas.';
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:[docBlock,{type:'text',text:prompt}]}]})});
  if(!res.ok)throw new Error('api '+res.status);
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  const clean=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  let j;try{j=JSON.parse(clean);}catch(e){const m=clean.match(/\{[\s\S]*\}/);if(!m)throw new Error('parse');j=JSON.parse(m[0]);}
  const num=v=>(v==null||v==='')?'':(typeof v==='number'?v:parseInt(String(v).replace(/[^\d]/g,''))||'');
  return {address:j.address||'',suburb:j.suburb||'',beds:num(j.beds),baths:num(j.baths),cars:num(j.cars),land:j.land||'',priceLow:num(j.priceLow),priceHigh:num(j.priceHigh),seller:j.sellerName||'',comps:(Array.isArray(j.comps)?j.comps:[]).map(c=>({address:c&&c.address||'',price:num(c&&c.price),date:c&&c.date||'',dom:num(c&&(c.dom||c.daysOnMarket))})).filter(c=>c.address),notes:j.agentNotes||''};
}
async function analyseRealCMA(p,file){

    catch(e){d=null;}

    }

}

/* ============================ METRICS ============================ */
function soldThisMonth(){return db.pipeline.filter(p=>p.stage==='Sold'&&p.saleDate&&(now()-p.saleDate)<=30*86400000).length;}
function monthlyRevenue(){return db.pipeline.filter(p=>p.stage==='Sold'&&p.saleDate&&(now()-p.saleDate)<=30*86400000).reduce((a,p)=>a+(p.salePrice||0),0);}
function pipelineValue(){return db.pipeline.filter(p=>p.stage!=='Sold'&&p.stage!=='Withdrawn').reduce((a,p)=>a+Math.round(((+p.priceLow||0)+(+p.priceHigh||0))/2),0);}
function last6Months(){const out=[];const base=new Date();for(let i=5;i>=0;i--){const d=new Date(base.getFullYear(),base.getMonth()-i,1);out.push({label:d.toLocaleDateString('en-AU',{month:'short'}),value:0,m:d.getMonth(),y:d.getFullYear()});}
  // seed-ish distribution from sold items + a little history
  const hist=[2,1,3,2,4,soldThisMonth()];out.forEach((o,i)=>o.value=hist[i]);return out;}

/* builder live binding + autosave */
function saveBuilder(){const p=db.proposals.find(x=>x.id===builderId);if(!p)return;ensureProposalDefaults(p);
  document.querySelectorAll('[data-f]').forEach(el=>{p[el.dataset.f]=el.value;});
  document.querySelectorAll('[data-fc]').forEach(el=>{p.content[el.dataset.fc]=el.value;});
  document.querySelectorAll('[data-cma]').forEach(el=>{if(p.cma[+el.dataset.cma])p.cma[+el.dataset.cma][el.dataset.f]=el.value;});
  const ft=document.querySelector('input[name="feetype"]:checked');if(ft)p.fee.type=ft.value;
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  let v;if((v=g('feePercent'))!==undefined)p.fee.percent=v;if((v=g('feeFixed'))!==undefined)p.fee.fixed=v;if((v=g('feeMin'))!==undefined)p.fee.minFee=v;
  const mo=document.getElementById('feeMinOn');if(mo)p.fee.minFeeOn=mo.checked;
  document.querySelectorAll('[data-pkg]').forEach(el=>{const parts=el.dataset.pkg.split(':');const idx=+parts[0],f=parts[1];if(p.packages[idx]){p.packages[idx][f]=(f==='inclusions')?el.value.split('\n').map(s=>s.trim()).filter(Boolean):el.value;}});
  const rec=document.querySelector('input[name="recpkg"]:checked');if(rec)p.recommendedPkg=rec.value;
  p.updatedAt=now();persist();}
let saveT;
document.addEventListener('input',e=>{
  if(route==='builder'&&(e.target.dataset.f||e.target.dataset.fc||e.target.dataset.cma!==undefined)){
    clearTimeout(saveT);saveT=setTimeout(()=>{saveBuilder();const si=$('#saveInd');if(si)si.innerHTML='<span class="dot" style="background:var(--sold)"></span>Auto-saved just now';},700);
  }
});

/* drag & drop pipeline + CMA dropzone */
function afterRender(){
  if(route==='pipeline'){
    let dragId=null;
    document.querySelectorAll('.kcard').forEach(c=>{
      c.addEventListener('dragstart',()=>{dragId=c.dataset.id;c.classList.add('dragging');});
      c.addEventListener('dragend',()=>{dragId=null;c.classList.remove('dragging');document.querySelectorAll('.kcol').forEach(k=>k.classList.remove('drop'));});
    });
    document.querySelectorAll('.kcol').forEach(col=>{
      col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drop');});
      col.addEventListener('dragleave',()=>col.classList.remove('drop'));
      col.addEventListener('drop',e=>{e.preventDefault();const stage=col.dataset.stage;const item=db.pipeline.find(p=>p.id===dragId);if(item&&item.stage!==stage){const prev=item.stage;item.stage=stage;item.enteredStageAt=now();if(stage==='Sold'){item.saleDate=now();item.salePrice=Math.round(((+item.priceLow||0)+(+item.priceHigh||0))/2);}logActivity((me().name.split(' ')[0])+' moved “'+item.address+'” to '+stage);persist();render();toast('Moved to '+stage);}});
    });
  }
  if(route==='builder'){
    const p=db.proposals.find(x=>x.id===builderId);
    if(p&&!builderReady(p)){
      const inp=$('#cmaInput'),dz=$('#dzBig');
      if(inp)inp.addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(f){attachCMA(p,f);}});
      if(dz){
        dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
        dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
        dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f){attachCMA(p,f);}});
      }
    } else {
      const dz=$('#dz');if(dz){
        dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
        dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
        dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];p.cma.push({address:f?('From: '+f.name):'New comparable',price:'',date:''});p.updatedAt=now();persist();render();toast('CMA file attached (demo)');});
      }
    }
  }
}

function emailDoc(inner){return `<!DOCTYPE html><html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Proposal email</title></head><body style="margin:0;padding:0;background-color:#f4f4f2;"><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f2;"><tr><td align="center" style="padding:28px 14px;">${inner}</td></tr></table></body></html>`;}
function emailPlain(p,sender,clientName){const t=db.settings.emailTemplate||defaultEmailTemplate();const link=proposalLink(p);const pp=Object.assign({},p,{sellerName:clientName||p.sellerName});return emFill(t.greeting,pp,link)+'\n\n'+emFill(t.intro,pp,link)+'\n\n'+emFill(t.body,pp,link)+'\n\nView your proposal: '+link+'\n\n'+emFill(t.closing,pp,link)+'\n\nKind regards,\n'+sender.name+'\n'+(sender.title||'')+((sender.phone||sender.email)?'\n'+(sender.phone||'')+(sender.phone&&sender.email?' · ':'')+(sender.email||''):'');}

async function copyRichHTML(html,plain,ifr){
  try{if(navigator.clipboard&&window.ClipboardItem){await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([plain||''],{type:'text/plain'})})]);return true;}}catch(e){}
  try{if(ifr&&ifr.contentDocument){const doc=ifr.contentDocument,win=ifr.contentWindow;const r=doc.createRange();r.selectNodeContents(doc.body);const sel=win.getSelection();sel.removeAllRanges();sel.addRange(r);const ok=doc.execCommand('copy');sel.removeAllRanges();if(ok)return true;}}catch(e){}
  try{const div=document.createElement('div');div.contentEditable='true';div.style.cssText='position:fixed;left:-9999px;top:0';div.innerHTML=html;document.body.appendChild(div);const r=document.createRange();r.selectNodeContents(div);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);const ok=document.execCommand('copy');sel.removeAllRanges();document.body.removeChild(div);return ok;}catch(e){return false;}
}

const M365_SCOPES=['User.Read','Mail.Send','Calendars.ReadWrite','offline_access'];
function m365Cfg(){const m=(db.settings&&db.settings.m365)||{};const tid=(m.tenantId||'').trim();return {clientId:(m.clientId||'').trim(),authority:'https://login.microsoftonline.com/'+(tid||'common'),redirectUri:location.origin+location.pathname};}
function m365Configured(){return !!m365Cfg().clientId;}
let _msalApp=null,_msalLoad=null;
function loadMsal(){if(window.msal)return Promise.resolve();if(_msalLoad)return _msalLoad;_msalLoad=new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://alcdn.msftauth.net/browser/2.38.4/js/msal-browser.min.js';s.async=true;s.onload=()=>res();s.onerror=()=>rej(new Error('Could not load the Microsoft sign-in library (offline?)'));document.head.appendChild(s);});return _msalLoad;}
async function msalApp(){await loadMsal();if(_msalApp)return _msalApp;const c=m365Cfg();_msalApp=new window.msal.PublicClientApplication({auth:{clientId:c.clientId,authority:c.authority,redirectUri:c.redirectUri},cache:{cacheLocation:'localStorage'}});if(typeof _msalApp.initialize==='function'){try{await _msalApp.initialize();}catch(e){}}return _msalApp;}
function outlookAccount(){try{if(!_msalApp)return null;return _msalApp.getActiveAccount()||_msalApp.getAllAccounts()[0]||null;}catch(e){return null;}}
async function outlookConnect(){if(!m365Configured()){toast('Add your Microsoft 365 Client ID in Settings first');return null;}try{const app=await msalApp();const r=await app.loginPopup({scopes:M365_SCOPES,prompt:'select_account'});app.setActiveAccount(r.account);toast('Outlook connected'+(r.account&&r.account.username?' - '+r.account.username:''));return r.account;}catch(e){toast('Outlook sign-in was cancelled or blocked');return null;}}
async function outlookDisconnect(){try{const app=await msalApp();const acct=outlookAccount();if(acct){await app.logoutPopup({account:acct});}}catch(e){}toast('Outlook disconnected');}
async function outlookToken(){try{const app=await msalApp();let acct=outlookAccount();if(acct){try{const r=await app.acquireTokenSilent({scopes:M365_SCOPES,account:acct});return r.accessToken;}catch(e){}}const r=await app.acquireTokenPopup({scopes:M365_SCOPES,prompt:'select_account'});if(r.account)app.setActiveAccount(r.account);return r.accessToken;}catch(e){return null;}}
async function outlookSendMail(to,subject,html){const token=await outlookToken();if(!token)return {ok:false,reason:'auth'};const recips=(to?String(to).split(/[;,]/).map(a=>a.trim()).filter(Boolean).map(a=>({emailAddress:{address:a}})):[]);const payload={message:{subject:subject||'(no subject)',body:{contentType:'HTML',content:html},toRecipients:recips},saveToSentItems:true};try{const res=await fetch('https://graph.microsoft.com/v1.0/me/sendMail',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)});return {ok:res.ok,status:res.status};}catch(e){return {ok:false,reason:'network'};}}
/* Calendar - ready for the later build phase */
async function outlookCreateEvent(ev){const token=await outlookToken();if(!token)return {ok:false,reason:'auth'};try{const res=await fetch('https://graph.microsoft.com/v1.0/me/events',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(ev)});return {ok:res.ok,status:res.status};}catch(e){return {ok:false,reason:'network'};}}

  return `${selLine}<div class="btns"><button class="pp-btn pp-btn-teal" data-action="pp-approve" data-id="${p.id}">Approve this proposal →</button><button class="pp-btn pp-btn-ghost" data-action="pp-meeting" data-id="${p.id}">Request a call or meeting</button></div>`;
}

Thank you for the opportunity to present our recommended sales and marketing strategy for ${esc(p.address||'your property')}. ${letter}</div>

function renderProposal(resetScroll){const p=db.proposals.find(x=>x.id===ppState.id);if(!p){closeModal();return;}const prev=resetScroll?0:((document.querySelector('.pp')||{}).scrollTop||0);$('#modalRoot').innerHTML=proposalHTML(p);const el=document.querySelector('.pp');if(el)el.scrollTop=prev;}
function __standaloneRuntime(DATA){
  function money(n){return '$'+(Number(n)||0).toLocaleString('en-AU');}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function pkg(id){for(var i=0;i<DATA.pkgs.length;i++){if(DATA.pkgs[i].id===id)return DATA.pkgs[i];}return null;}
  var sel=DATA.selId;
  function renderSel(){
    var el=document.getElementById('ppSelLine'); if(!el)return;
    var p=pkg(sel); if(!p){el.innerHTML='';return;}
    var rec=pkg(DATA.recId), h='Selected marketing package: <b style="color:var(--teal)">'+esc(p.name)+(p.price?' · '+money(p.price):'')+'</b>';
    if(sel!==DATA.recId&&rec)h+=' <span style="color:rgba(255,255,255,.5)">(our recommendation: '+esc(rec.name)+')</span>';
    h+=' <span style="color:rgba(255,255,255,.5)">- change above</span>'; el.innerHTML=h;
  }
  function selectPkg(id){
    sel=id; var cards=document.querySelectorAll('.pp .pkg');
    for(var i=0;i<cards.length;i++){ var card=cards[i], btn=card.querySelector('.pp-pick'), pid=btn?btn.getAttribute('data-pkg'):null, on=pid===id;
      if(on)card.classList.add('sel');else card.classList.remove('sel');
      if(btn){ if(on){btn.classList.add('on');btn.textContent='✓ Your selection';} else {btn.classList.remove('on');btn.textContent='Select this package';} } }
    renderSel();
  }
  function mailto(kind){
    var p=pkg(sel), subj=(kind==='approve'?'Proposal approved':'Meeting request')+' - '+DATA.address, L=[];
    L.push(kind==='approve'?'I would like to approve this proposal.':'I would like to request a call or meeting about this proposal.');
    L.push(''); L.push('Property: '+DATA.address);
    if(DATA.client)L.push('From: '+DATA.client);
    if(p)L.push('Marketing package: '+p.name+(p.price?' ('+money(p.price)+')':''));
    L.push('Proposal: '+DATA.link);
    window.location.href='mailto:'+encodeURIComponent(DATA.notify)+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(L.join('\n'));
  }
  document.addEventListener('click',function(e){
    var t=(e.target&&e.target.closest)?e.target.closest('[data-action]'):null; if(!t)return;
    var a=t.getAttribute('data-action');
    if(a==='pp-pick-pkg'){e.preventDefault();selectPkg(t.getAttribute('data-pkg'));}
    else if(a==='pp-approve'){e.preventDefault();mailto('approve');}
    else if(a==='pp-meeting'){e.preventDefault();mailto('meeting');}
    else if(a==='pp-close'){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});}
    else if(a==='pp-dl-cma'){e.preventDefault();if(DATA.cma&&DATA.cma.url){var x=document.createElement('a');x.href=DATA.cma.url;x.download=DATA.cma.name||'CMA.pdf';document.body.appendChild(x);x.click();x.remove();}}
  });
  renderSel();
}
function exportProposalPage(p){
  ensureProposalDefaults(p);
  const keep=ppState;
  ppState={id:p.id,mode:'view',selectedPkg:(p.clientResponse&&p.clientResponse.selectedPkg)||p.recommendedPkg};
  let inner;
  try{ inner=proposalHTML(p); } finally { ppState=keep; }
  const embedCma=!!p.cmaDataUrl;
  if(!embedCma){ inner=inner.replace(/<div class="pp-cma-dl">[\s\S]*?<\/button><\/div>/,''); }
  const styles=Array.prototype.map.call(document.querySelectorAll('style'),s=>s.innerHTML).join('\n');
  const lead=(db.settings.team||[]).find(t=>t.lead)||(db.settings.team||[])[0]||{};
  const DATA={
    notify: lead.email||'info@matteblackre.com.au',
    link: proposalLink(p),
    address: p.address||'Your property',
    client: p.sellerName||'',
    pkgs: (p.packages||[]).map(pk=>({id:pk.id,name:pk.name,price:pk.price||''})),
    recId: p.recommendedPkg||'',
    selId: (p.clientResponse&&p.clientResponse.selectedPkg)||p.recommendedPkg||'',
    cma: embedCma?{url:p.cmaDataUrl,name:p.cmaFile||'CMA.pdf'}:null
  };
  const css='html,body{margin:0}body{background:#fff}.pp{position:static!important;inset:auto!important;min-height:100vh;overflow:visible!important}.pp-bar .x{display:none!important}';
  return '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(p.address||'Proposal')+' - Matte Black Real Estate</title><style>'+styles+'\n'+css+'</style></head><body>'+inner+'\n<script>('+__standaloneRuntime.toString()+')('+JSON.stringify(DATA)+');<\/script></body></html>';
}
function openPreview(id){
  const p=db.proposals.find(x=>x.id===id);if(!p)return;ensureProposalDefaults(p);
  if(p.status==='published'){p.views++;persist();}
  ppState={id,mode:p.clientResponse?(p.clientResponse.type==='approved'?'approved':'requested'):'view',selectedPkg:(p.clientResponse&&p.clientResponse.selectedPkg)||p.recommendedPkg};
  renderProposal(true);
}
function navClip(text){try{navigator.clipboard.writeText(text);}catch(e){}}
function triggerDownload(url,name){try{const a=document.createElement('a');a.href=url;a.download=name||'download';document.body.appendChild(a);a.click();a.remove();}catch(e){window.open(url,'_blank');}}
function attachCMA(p,f){if(!p||!f)return;cmaFiles[p.id]=f;p.cmaFile=f.name;p.cmaType=f.type||'';p.cmaDataUrl='';persist();render();
  // Embed for client download + persistence when small enough; large files stay available for this session via the in-memory file.
  try{const reader=new FileReader();reader.onload=()=>{const url=reader.result;if(typeof url==='string'&&url.length<3800000){p.cmaDataUrl=url;persist();if(route==='builder')render();}};reader.readAsDataURL(f);}catch(e){}}
